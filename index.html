<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบส่งงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Kanit', sans-serif; height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 380px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 20px; }
        .btn-login { background: #4e73df; color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 500; }
        /* สไตล์เพิ่มเติมสำหรับโลโก้ */
        .logo-img { max-width: 150px; height: auto; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="login-card text-center">
   <img src="logo.png" alt="โลโก้ระบบ" class="logo-img">
    <div class="mb-4">
        <h4 class="fw-bold">เข้าสู่ระบบส่งงาน</h4>
        <p class="text-muted small">กรุณากรอกชื่อผู้ใช้และรหัสผ่าน</p>
    </div>

    <form id="loginForm" class="text-start">
        <label class="form-label small">ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="user" class="form-control" required>

        <div class="d-flex justify-content-between">
            <label class="form-label small">รหัสผ่าน</label>
            <a href="forgot.html" class="small text-decoration-none">ลืมรหัสผ่าน?</a>
        </div>
        <input type="password" id="pass" class="form-control" required>

        <button type="submit" class="btn btn-login">เข้าสู่ระบบ</button>
    </form>

    <div class="text-center mt-4">
        <span class="small">ยังไม่มีบัญชี? <a href="register.html" class="text-decoration-none">สมัครสมาชิก</a></span>
    </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    // --- 1. เช็ครหัสครู (ล็อกตายตัวตามที่คุณต้องการ) ---
    if (u === '67121440117' && p === '123') {
        localStorage.setItem('currentUser', JSON.stringify({fname: 'คุณครู', role: 'teacher'}));
        window.location.href = 'teacher.html';
        return;
    }

    const scriptURL = 'https://script.google.com/macros/s/AKfycbzXhnVw2eCEsUU8iM9ji7Dpota1BQXwrgIvSdjJZI_mxA3un9jzzqZPs2xw3NEX3ckvsw/exec';
    
    fetch(scriptURL)
    .then(res => res.json())
    .then(users => {
        const student = users.find(s => s.username === u && s.password === p);
        if (student) {
            localStorage.setItem('currentUser', JSON.stringify(student));
            window.location.href = 'student.html';
        } else {
            Swal.fire('ไม่พบข้อมูล', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
        }
    })
    .catch(() => Swal.fire('Error', 'การเชื่อมต่อผิดพลาด', 'error'));
});
</script>

</body>
</html>
