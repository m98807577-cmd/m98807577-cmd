<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ระบบส่งงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Kanit', sans-serif; display: flex; align-items: center; min-height: 100vh; margin: 0; }
        .reg-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; width: 100%; max-width: 450px; margin: auto; }
        .form-control { border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .btn-reg { background: #2dce89; color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 500; }
    </style>
</head>
<body>

<div class="reg-card">
    <h3 class="text-center fw-bold mb-4">สมัครสมาชิกนักเรียน</h3>
    
    <form id="mainForm">
        <div class="row">
            <div class="col-6">
                <label class="form-label small">ชื่อ</label>
                <input type="text" id="fname" class="form-control" required>
            </div>
            <div class="col-6">
                <label class="form-label small">นามสกุล</label>
                <input type="text" id="lname" class="form-control" required>
            </div>
        </div>

        <label class="form-label small">รหัสประจำตัว</label>
        <input type="text" id="idCode" class="form-control" required>

        <div id="studentFields">
            <div class="row">
                <div class="col-6">
                    <label class="form-label small">ชั้น (เช่น ม.1/1)</label>
                    <input type="text" id="grade" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label small">เลขที่</label>
                    <input type="number" id="no" class="form-control" required>
                </div>
            </div>
        </div>

        <hr>
        <label class="form-label small text-primary">ตั้งชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="username" class="form-control" required>

        <label class="form-label small text-primary">ตั้งรหัสผ่าน</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>

        <button type="submit" class="btn btn-reg mt-2">ยืนยันการสมัครนักเรียน</button>
    </form>

    <div class="text-center mt-3">
        <a href="index.html" class="small text-decoration-none text-muted">กลับไปหน้าล็อคอิน</a>
    </div>
</div>

<script>
    // *** สำคัญ: เอา URL จาก Google Apps Script ของคุณมาวางที่นี่ ***
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzXhnVw2eCEsUU8iM9ji7Dpota1BQXwrgIvSdjJZI_mxA3un9jzzqZPs2xw3NEX3ckvsw/exec';

    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. เตรียมข้อมูลนักเรียน
        const newUser = {
            action: 'register',
            role: 'student', // ล็อกเป็นนักเรียนเท่านั้น
            fname: document.getElementById('fname').value,
            lname: document.getElementById('lname').value,
            idCode: document.getElementById('idCode').value,
            grade: document.getElementById('grade').value,
            no: document.getElementById('no').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            keep: 0,
            mid: 0,
            final: 0
        };

        // แสดง Loading
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // 2. ส่งข้อมูลไปที่ Google Sheets (Cloud)
        // ใช้ fetch เพื่อให้ข้อมูลจากเครื่องเด็ก วิ่งไปหาเครื่องครูได้
        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(newUser)
        })
        .then(response => {
            Swal.fire({
                title: 'สมัครสำเร็จ!',
                text: 'ยินดีต้อนรับ ' + newUser.fname,
                icon: 'success',
                confirmButtonColor: '#2dce89'
            }).then(() => {
                window.location.href = 'index.html';
            });
        })
        .catch(error => {
            console.error('Error!', error.message);
            Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
        });
    });
</script>

</body>
</html>
